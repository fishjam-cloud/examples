          format: double
          nullable: true
          type: number
    UnregisterRenderer:
      example:
        schedule_time_ms: 0.8008281904610115
      properties:
        schedule_time_ms:
          description: |-
            Time in milliseconds when this request should be applied. Value `0` represents
