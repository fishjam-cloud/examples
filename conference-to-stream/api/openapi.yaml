      type: string
    OutputEndCondition:
      additionalProperties: false
      description: |-
        This type defines when end of an input stream should trigger end of the output stream. Only one of those fields can be set at the time.
        Unless specified otherwise the input stream is considered finished/ended when:
        - TCP connection was dropped/closed.
        - RTCP Goodbye packet (`BYE`) was received.
        - Mp4 track has ended.
        - Input was unregistered already (or never registered).
      properties:
        any_of:
          description: Terminate output stream if any of the input streams from the
            list are finished.
          items:
            $ref: "#/components/schemas/InputId"
          nullable: true
          type: array
        all_of:
          description: Terminate output stream if all the input streams from the list
            are finished.
          items:
            $ref: "#/components/schemas/InputId"
          nullable: true
          type: array
        any_input:
          description: "Terminate output stream if any of the input streams ends.\
            \ This includes streams added after the output was registered. In particular,\
            \ output stream will **not be** terminated if no inputs were ever connected."
          nullable: true
          type: boolean
        all_inputs:
          description: "Terminate output stream if all the input streams finish. In\
            \ particular, output stream will **be** terminated if no inputs were ever\
            \ connected."
          nullable: true
          type: boolean
