      - $ref: "#/components/schemas/ShaderParam_oneOf_4"
    ShaderParamStructField:
      allOf:
      - $ref: "#/components/schemas/ShaderParam"
      - properties:
          field_name:
            type: string
        required:
        - field_name
    ShaderSpec:
      additionalProperties: {}
      properties:
        source:
          description: "Shader source code. [Learn more.](../../concept/shaders)"
          type: string
      required:
      - source
    Text:
      additionalProperties: false
      properties:
        id:
          allOf:
          - $ref: "#/components/schemas/ComponentId"
          description: Id of a component.
          nullable: true
        text:
          description: Text that will be rendered.
          type: string
        width:
          description: |-
            Width of a texture that text will be rendered on. If not provided, the resulting texture
            will be sized based on the defined text but limited to `max_width` value.
          format: float
          nullable: true
          type: number
        height:
          description: |-
            Height of a texture that text will be rendered on. If not provided, the resulting texture
            will be sized based on the defined text but limited to `max_height` value.
            It's an error to provide `height` if `width` is not defined.
          format: float
          nullable: true
          type: number
        max_width:
          description: |-
            (**default=`7682`**) Maximal `width`. Limits the width of the texture that the text will be rendered on.
            Value is ignored if `width` is defined.
          format: float
          nullable: true
          type: number
        max_height:
          description: |-
            (**default=`4320`**) Maximal `height`. Limits the height of the texture that the text will be rendered on.
            Value is ignored if height is defined.
          format: float
          nullable: true
          type: number
        font_size:
          description: Font size in pixels.
          format: float
          type: number
        line_height:
          description: Distance between lines in pixels. Defaults to the value of
            the `font_size` property.
          format: float
          nullable: true
          type: number
        color:
          allOf:
          - $ref: "#/components/schemas/RGBAColor"
          description: (**default=`"#FFFFFFFF"`**) Font color in `#RRGGBBAA` format.
          nullable: true
        background_color:
          allOf:
          - $ref: "#/components/schemas/RGBAColor"
          description: (**default=`"#00000000"`**) Background color in `#RRGGBBAA`
            format.
          nullable: true
        font_family:
          description: |-
            (**default=`"Verdana"`**) Font family. Provide [family-name](https://www.w3.org/TR/2018/REC-css-fonts-3-20180920/#family-name-value)
            for a specific font. "generic-family" values like e.g. "sans-serif" will not work.
          nullable: true
          type: string
        style:
          allOf:
          - $ref: "#/components/schemas/TextStyle"
          description: (**default=`"normal"`**) Font style. The selected font needs
            to support the specified style.
          nullable: true
        align:
          allOf:
          - $ref: "#/components/schemas/HorizontalAlign"
          description: (**default=`"left"`**) Text align.
          nullable: true
        wrap:
          allOf:
          - $ref: "#/components/schemas/TextWrapMode"
          description: (**default=`"none"`**) Text wrapping options.
          nullable: true
        weight:
          allOf:
          - $ref: "#/components/schemas/TextWeight"
          description: (**default=`"normal"`**) Font weight. The selected font needs
            to support the specified weight.
          nullable: true
      required:
      - font_size
      - text
    TextStyle:
      enum:
      - normal
      - italic
      - oblique
      type: string
    TextWeight:
      description: "Font weight, based on the [OpenType specification](https://learn.microsoft.com/en-gb/typography/opentype/spec/os2#usweightclass)."
      enum:
      - thin
      - extra_light
      - light
      - normal
      - medium
      - semi_bold
      - bold
      - extra_bold
      - black
      type: string
    TextWrapMode:
      enum:
      - none
      - glyph
      - word
      type: string
    Tiles:
      additionalProperties: false
      properties:
        id:
          allOf:
          - $ref: "#/components/schemas/ComponentId"
          description: Id of a component.
          nullable: true
        children:
          description: List of component's children.
          items:
            $ref: "#/components/schemas/Component"
          nullable: true
          type: array
        width:
          description: |-
            Width of a component in pixels. Exact behavior might be different based on the parent
            component:
            - If the parent component is a layout, check sections "Absolute positioning" and "Static
              positioning" of that component.
            - If the parent component is not a layout, then this field is required.
          format: float
          nullable: true
          type: number
        height:
          description: |-
            Height of a component in pixels. Exact behavior might be different based on the parent
            component:
            - If the parent component is a layout, check sections "Absolute positioning" and "Static
              positioning" of that component.
            - If the parent component is not a layout, then this field is required.
          format: float
          nullable: true
          type: number
        background_color:
          allOf:
          - $ref: "#/components/schemas/RGBAColor"
          description: (**default=`"#00000000"`**) Background color in a `"#RRGGBBAA"`
            format.
          nullable: true
        tile_aspect_ratio:
          allOf:
          - $ref: "#/components/schemas/AspectRatio"
          description: "(**default=`\"16:9\"`**) Aspect ratio of a tile in `\"W:H\"\
            ` format, where W and H are integers."
          nullable: true
        margin:
          description: (**default=`0`**) Margin of each tile in pixels.
          format: float
          nullable: true
          type: number
        padding:
          description: (**default=`0`**) Padding on each tile in pixels.
          format: float
          nullable: true
          type: number
        horizontal_align:
          allOf:
          - $ref: "#/components/schemas/HorizontalAlign"
          description: (**default=`"center"`**) Horizontal alignment of tiles.
          nullable: true
        vertical_align:
          allOf:
          - $ref: "#/components/schemas/VerticalAlign"
          description: (**default=`"center"`**) Vertical alignment of tiles.
          nullable: true
        transition:
          allOf:
          - $ref: "#/components/schemas/Transition"
          description: |-
            Defines how this component will behave during a scene update. This will only have an
            effect if the previous scene already contained a `Tiles` component with the same id.
          nullable: true
    Transition:
      properties:
        duration_ms:
          description: Duration of a transition in milliseconds.
          format: double
          type: number
        easing_function:
          allOf:
          - $ref: "#/components/schemas/EasingFunction"
          description: (**default=`"linear"`**) Easing function to be used for the
            transition.
          nullable: true
        should_interrupt:
          description: |-
            (**default=`false`**) On scene update, if there is already a transition in progress,
            it will be interrupted and the new transition will start from the current state.
          nullable: true
          type: boolean
      required:
