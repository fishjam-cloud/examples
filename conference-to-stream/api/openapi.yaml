openapi: 3.1.0
info:
  description: Real-time video compositing
  license:
    name: Apache 2.0
  title: Composition API
  version: 0.1.0
servers:
- url: https://rtc.fishjam.io
paths:
  /api/composition:
    post:
      operationId: create_composition
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompositionRequest"
        description: Composition creation options.
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionCreatedResponse"
          description: Composition created.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - composition
  /api/composition/{composition_id}:
    delete:
      operationId: delete_composition
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Composition deleted.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - composition
  /api/composition/{composition_id}/start:
    post:
      operationId: start
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Composition started.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - control_request
  /api/composition/{composition_id}/reset:
    post:
      operationId: reset
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Composition reset.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - control_request
  /api/composition/{composition_id}/input/{input_id}/register:
    post:
      operationId: register_input
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Input ID.
        explode: false
        in: path
        name: input_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Input registered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - register_request
  /api/composition/{composition_id}/output/{output_id}/register:
    post:
      operationId: register_output
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Output ID.
        explode: false
        in: path
        name: output_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterOutput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Output registered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - register_request
  /api/composition/{composition_id}/image/{image_id}/register:
    post:
      operationId: register_image
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Image ID.
        explode: false
        in: path
        name: image_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageSpec"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Image registered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - register_request
  /api/composition/{composition_id}/font/register:
    post:
      operationId: register_font
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/register_font_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Font registered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - register_request
  /api/composition/{composition_id}/input/{input_id}/unregister:
    post:
      operationId: unregister_input
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Input ID.
        explode: false
        in: path
        name: input_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Input unregistered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Input not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - unregister_request
  /api/composition/{composition_id}/output/{output_id}/unregister:
    post:
      operationId: unregister_output
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Output ID.
        explode: false
        in: path
        name: output_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterOutput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Output unregistered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Output not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - unregister_request
  /api/composition/{composition_id}/image/{image_id}/unregister:
    post:
      operationId: unregister_image
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Image ID.
        explode: false
        in: path
        name: image_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterRenderer"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Image unregistered successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Image not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - unregister_request
  /api/composition/{composition_id}/output/{output_id}/update:
    post:
      operationId: update_output
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Output ID.
        explode: false
        in: path
        name: output_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOutputRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Output updated successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - update_request
  /api/composition/{composition_id}/output/{output_id}/request_keyframe:
    post:
      operationId: request_keyframe
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Output ID.
        explode: false
        in: path
        name: output_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Keyframe request successful.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      tags:
      - update_request
  /api/composition/{composition_id}/whip/{input_id}:
    post:
      operationId: whip_offer
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Input ID.
        explode: false
        in: path
        name: input_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/sdp:
            schema:
              type: string
        description: SDP offer.
        required: true
      responses:
        "201":
          content:
            application/sdp:
              schema:
                type: string
          description: Session created.
          headers:
            location:
              description: Session URL.
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Unauthorized.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition or input not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      security:
      - BearerAuth: []
      tags:
      - whip_whep
  /api/composition/{composition_id}/whep/{output_id}:
    post:
      operationId: whep_offer
      parameters:
      - description: Composition ID.
        explode: false
        in: path
        name: composition_id
        required: true
        schema:
          type: string
        style: simple
      - description: Output ID.
        explode: false
        in: path
        name: output_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/sdp:
            schema:
              type: string
        description: SDP offer.
        required: true
      responses:
        "201":
          content:
            application/sdp:
              schema:
                type: string
          description: Session created.
          headers:
            location:
              description: Session URL.
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Unauthorized.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Composition or output not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Internal server error.
      security:
      - {}
      - BearerAuth: []
      tags:
      - whip_whep
components:
  schemas:
    AacRtpMode:
      enum:
      - low_bitrate
      - high_bitrate
      type: string
    ApiError:
      example:
        http_status_code: 0
        message: message
      properties:
        message:
          type: string
        http_status_code:
          format: int32
          minimum: 0
          type: integer
      required:
      - http_status_code
      - message
    AspectRatio:
      type: string
    AudioChannels:
      enum:
      - mono
      - stereo
      type: string
    AudioMixingStrategy:
      enum:
      - sum_clip
      - sum_scale
      type: string
    AudioScene:
      additionalProperties: false
      properties:
        inputs:
          items:
            $ref: "#/components/schemas/AudioSceneInput"
          type: array
      required:
      - inputs
    AudioSceneInput:
      additionalProperties: false
      properties:
        input_id:
          type: string
        volume:
          description: "(**default=`1.0`**) float in `[0, 2]` range representing input\
            \ volume"
          format: float
          nullable: true
          type: number
      required:
      - input_id
    BoxShadow:
      additionalProperties: false
      properties:
        offset_x:
          format: float
          nullable: true
          type: number
        offset_y:
          format: float
          nullable: true
          type: number
        color:
          allOf:
          - $ref: "#/components/schemas/RGBAColor"
          nullable: true
        blur_radius:
          format: float
          nullable: true
          type: number
    Component:
      oneOf:
      - $ref: "#/components/schemas/Component_oneOf"
      - $ref: "#/components/schemas/Component_oneOf_1"
      - $ref: "#/components/schemas/Component_oneOf_2"
      - $ref: "#/components/schemas/Component_oneOf_3"
      - $ref: "#/components/schemas/Component_oneOf_4"
    ComponentId:
      type: string
    CompositionCreatedResponse:
      example:
        api_url: api_url
        composition_id: composition_id
      properties:
        composition_id:
          type: string
        api_url:
          type: string
      required:
      - api_url
      - composition_id
    CompositionId:
      type: string
    CreateCompositionRequest:
      example:
        autostart: true
      properties:
        autostart:
          default: true
          description: |-
            If true, outputs will immediately start producing audio and video.
            If false, call `POST /api/composition/{composition_id}/start` to start the composition.
          type: boolean
    EasingFunction:
      description: |-
        Easing functions are used to interpolate between two values over time.

        Custom easing functions can be implemented with cubic Bézier.
        The control points are defined with `points` field by providing four numerical values: `x1`, `y1`, `x2` and `y2`. The `x1` and `x2` values have to be in the range `[0; 1]`. The cubic Bézier result is clamped to the range `[0; 1]`.
        You can find example control point configurations [here](https://easings.net/).
      oneOf:
      - $ref: "#/components/schemas/EasingFunction_oneOf"
      - $ref: "#/components/schemas/EasingFunction_oneOf_1"
      - $ref: "#/components/schemas/EasingFunction_oneOf_2"
    FontUpload:
      properties:
        font:
          format: binary
          type: string
      required:
      - font
    Framerate:
      oneOf:
      - type: string
      - format: int32
        minimum: 0
        type: integer
    H264EncoderPreset:
      enum:
      - ultrafast
      - superfast
      - veryfast
      - faster
      - fast
      - medium
      - slow
      - slower
      - veryslow
      - placebo
      type: string
    HlsAudioEncoderOptions:
      properties:
        sample_rate:
          description: "(**default=`44100`**) Sample rate. Allowed values: [8000,\
            \ 16000, 24000, 44100, 48000]."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        type:
          enum:
          - aac
          type: string
      required:
      - type
    HlsInput:
      additionalProperties: false
      description: Parameters for an input stream from HLS source.
      properties:
        url:
          description: URL to HLS playlist
          type: string
        required:
          description: |-
            (**default=`false`**) If input is required and the stream is not delivered
            on time, then Smelter will delay producing output frames.
          nullable: true
          type: boolean
        offset_ms:
          description: |-
            Offset in milliseconds relative to the pipeline start (start request). If the offset is
            not defined then the stream will be synchronized based on the delivery time of the initial
            frames.
          format: double
          nullable: true
          type: number
      required:
      - url
    HlsOutput:
      additionalProperties: false
      properties:
        path:
          description: Path to output HLS playlist.
          type: string
        max_playlist_size:
          description: |-
            Number of segments kept in the playlist. When the limit is reached the oldest segment is removed.
            If not specified, no segments will removed.
          minimum: 0
          nullable: true
          type: integer
        video:
          allOf:
          - $ref: "#/components/schemas/OutputHlsVideoOptions"
          description: Video track configuration.
          nullable: true
        audio:
          allOf:
          - $ref: "#/components/schemas/OutputHlsAudioOptions"
          description: Audio track configuration.
          nullable: true
      required:
      - path
    HlsVideoDecoderOptions:
      enum:
      - ffmpeg_h264
      - vulkan_h264
      type: string
    HlsVideoEncoderOptions:
      oneOf:
      - $ref: "#/components/schemas/HlsVideoEncoderOptions_oneOf"
      - $ref: "#/components/schemas/HlsVideoEncoderOptions_oneOf_1"
    HorizontalAlign:
      enum:
      - left
      - right
      - justified
      - center
      type: string
    ImageSpec:
      oneOf:
      - $ref: "#/components/schemas/ImageSpec_oneOf"
      - $ref: "#/components/schemas/ImageSpec_oneOf_1"
      - $ref: "#/components/schemas/ImageSpec_oneOf_2"
      - $ref: "#/components/schemas/ImageSpec_oneOf_3"
      - $ref: "#/components/schemas/ImageSpec_oneOf_4"
    InputHlsCodec:
      enum:
      - h264
      type: string
    InputId:
      type: string
    InputMp4Codec:
      enum:
      - h264
      type: string
    InputRtmpCodec:
      enum:
      - h264
      type: string
    InputRtpAudioOptions:
      oneOf:
      - $ref: "#/components/schemas/InputRtpAudioOptions_oneOf"
      - $ref: "#/components/schemas/InputRtpAudioOptions_oneOf_1"
    InputRtpVideoOptions:
      additionalProperties: false
      properties:
        decoder:
          $ref: "#/components/schemas/RtpVideoDecoderOptions"
      required:
      - decoder
    InputStream:
      additionalProperties: false
      properties:
        id:
          allOf:
          - $ref: "#/components/schemas/ComponentId"
          description: Id of a component.
          nullable: true
        input_id:
          allOf:
          - $ref: "#/components/schemas/InputId"
          description: "Id of an input. It identifies a stream registered using a\
            \ [`RegisterInputStream`](../routes.md#register-input) request."
      required:
      - input_id
    InputWhepVideoOptions:
      additionalProperties: false
      properties:
        decoder_preferences:
          items:
            $ref: "#/components/schemas/WhepVideoDecoderOptions"
          nullable: true
          type: array
    InputWhipVideoOptions:
      additionalProperties: false
      properties:
        decoder_preferences:
          items:
            $ref: "#/components/schemas/WhipVideoDecoderOptions"
          nullable: true
          type: array
    Interpolation:
      enum:
      - linear
      - spring
      type: string
    Mp4AudioEncoderOptions:
      properties:
        sample_rate:
          description: "(**default=`44100`**) Sample rate. Allowed values: [8000,\
            \ 16000, 24000, 44100, 48000]."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        type:
          enum:
          - aac
          type: string
      required:
      - type
    Mp4Input:
      additionalProperties: false
      description: |-
        Input stream from MP4 file.
        Exactly one of `url` and `path` has to be defined.
      properties:
        url:
          description: URL of the MP4 file.
          nullable: true
          type: string
        loop:
          description: (**default=`false`**) If input should be played in the loop.
            <span class="badge badge--primary">Added in v0.4.0</span>
          nullable: true
          type: boolean
        required:
          description: |-
