          Average bitrate measured in bits/second. Encoder will try to keep the bitrate around the provided average,
          but may temporarily increase it by 25%.
        format: int64
        minimum: 0
        type: integer
      - $ref: "#/components/schemas/VideoEncoderBitrate_oneOf"
    VideoScene:
      additionalProperties: false
      properties:
        root:
          $ref: "#/components/schemas/Component"
      required:
      - root
    View:
      additionalProperties: false
      properties:
        id:
          allOf:
          - $ref: "#/components/schemas/ComponentId"
          description: Id of a component.
          nullable: true
        children:
          description: List of component's children.
          items:
            $ref: "#/components/schemas/Component"
          nullable: true
          type: array
        width:
          description: |-
            Width of a component in pixels (without a border). Exact behavior might be different
            based on the parent component:
            - If the parent component is a layout, check sections "Absolute positioning" and "Static
              positioning" of that component.
            - If the parent component is not a layout, then this field is required.
          format: float
          nullable: true
          type: number
        height:
          description: |-
            Height of a component in pixels (without a border). Exact behavior might be different
            based on the parent component:
            - If the parent component is a layout, check sections "Absolute positioning" and "Static
              positioning" of that component.
            - If the parent component is not a layout, then this field is required.
          format: float
          nullable: true
          type: number
        direction:
          allOf:
          - $ref: "#/components/schemas/ViewDirection"
          description: Direction defines how static children are positioned inside
            a View component.
          nullable: true
        top:
          description: |-
            Distance in pixels between this component's top edge and its parent's top edge (including a border).
            If this field is defined, then the component will ignore a layout defined by its parent.
          format: float
          nullable: true
          type: number
        left:
          description: |-
            Distance in pixels between this component's left edge and its parent's left edge (including a border).
            If this field is defined, this element will be absolutely positioned, instead of being
            laid out by its parent.
          format: float
          nullable: true
          type: number
        bottom:
          description: |-
            Distance in pixels between the bottom edge of this component and the bottom edge of its
            parent (including a border). If this field is defined, this element will be absolutely
            positioned, instead of being laid out by its parent.
          format: float
          nullable: true
          type: number
        right:
          description: |-
            Distance in pixels between this component's right edge and its parent's right edge.
            If this field is defined, this element will be absolutely positioned, instead of being
            laid out by its parent.
          format: float
          nullable: true
          type: number
        rotation:
          description: |-
            Rotation of a component in degrees. If this field is defined, this element will be
            absolutely positioned, instead of being laid out by its parent.
          format: float
          nullable: true
          type: number
        transition:
          allOf:
          - $ref: "#/components/schemas/Transition"
          description: |-
            Defines how this component will behave during a scene update. This will only have an
            effect if the previous scene already contained a `View` component with the same id.
          nullable: true
        overflow:
          allOf:
          - $ref: "#/components/schemas/Overflow"
          description: (**default=`"hidden"`**) Controls what happens to content that
            is too big to fit into an area.
          nullable: true
        background_color:
          allOf:
          - $ref: "#/components/schemas/RGBAColor"
          description: (**default=`"#00000000"`**) Background color in a `"#RRGGBBAA"`
            format.
          nullable: true
        border_radius:
          description: (**default=`0.0`**) Radius of a rounded corner.
          format: float
          nullable: true
          type: number
        border_width:
          description: (**default=`0.0`**) Border width.
          format: float
          nullable: true
          type: number
        border_color:
          allOf:
          - $ref: "#/components/schemas/RGBAColor"
          description: (**default=`"#00000000"`**) Border color in a `"#RRGGBBAA"`
            format.
          nullable: true
        box_shadow:
          description: List of box shadows.
          items:
            $ref: "#/components/schemas/BoxShadow"
          nullable: true
          type: array
        padding:
          description: (**default=`0.0`**) Padding for all sides of the component.
          format: float
          nullable: true
          type: number
        padding_vertical:
          description: (**default=`0.0`**) Padding for the top and bottom of the component.
          format: float
          nullable: true
          type: number
        padding_horizontal:
          description: (**default=`0.0`**) Padding for the left and right of the component.
          format: float
          nullable: true
          type: number
        padding_top:
          description: (**default=`0.0`**) Padding on top side in pixels.
          format: float
          nullable: true
          type: number
        padding_right:
          description: (**default=`0.0`**) Padding on right side in pixels.
          format: float
          nullable: true
          type: number
        padding_bottom:
          description: (**default=`0.0`**) Padding on bottom side in pixels.
          format: float
          nullable: true
          type: number
        padding_left:
          description: (**default=`0.0`**) Padding on left side in pixels.
          format: float
          nullable: true
          type: number
    ViewDirection:
