services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      FISHJAM_ID: ${FISHJAM_ID}
      FISHJAM_MANAGEMENT_TOKEN: ${FISHJAM_MANAGEMENT_TOKEN}
      PORT: 8080
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_FISHJAM_ID: ${VITE_FISHJAM_ID}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
